<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Download Medicai Sync</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="preload" as="image" href="icon.png">
  <style>
    :root {
      --color-primary: #02c39a;
      --color-primary-hover: #01a883;
      --color-primary-soft: #ebfffb;
      --color-text: #0e1f1a;
      --color-text-muted: #5e716c;
      --color-text-subtle: #8a9994;
      --color-bg: #ffffff;
      --color-surface: #f6f9f8;
      --color-border: #e3eae7;
      --color-border-strong: #cdd9d4;
      --shadow-sm: 0 1px 2px rgba(2, 30, 24, 0.04);
      --shadow-md: 0 4px 12px rgba(2, 30, 24, 0.06), 0 1px 3px rgba(2, 30, 24, 0.04);
      --shadow-lg: 0 12px 32px rgba(2, 30, 24, 0.08), 0 4px 12px rgba(2, 30, 24, 0.05);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --transition: 150ms cubic-bezier(0.2, 0.6, 0.3, 1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-text: #e8efed;
        --color-text-muted: #98a8a3;
        --color-text-subtle: #6b7975;
        --color-bg: #0c1311;
        --color-surface: #131c1a;
        --color-border: #1f2b27;
        --color-border-strong: #2c3a35;
        --color-primary-soft: #082a23;
      }
    }

    * { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Roboto, Helvetica, Arial, sans-serif;
      color: var(--color-text);
      background: var(--color-bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, var(--color-primary-soft), transparent 70%),
        radial-gradient(ellipse 60% 40% at 100% 100%, var(--color-primary-soft), transparent 70%);
      line-height: 1.55;
    }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 88px 24px 56px;
      text-align: center;
    }

    .icon {
      width: 128px;
      height: 128px;
      margin: 0 auto 28px;
      filter: drop-shadow(0 8px 24px rgba(2, 195, 154, 0.25));
    }
    h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
    }
    .tagline {
      font-size: 16px;
      color: var(--color-text-muted);
      margin: 0 auto 40px;
      max-width: 440px;
    }

    .cta {
      margin: 0 auto 16px;
    }
    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 32px;
      background: var(--color-primary);
      color: white;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
    }
    .primary-btn:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-lg);
    }
    .primary-btn:active { transform: translateY(0); box-shadow: var(--shadow-md); }
    .primary-btn:focus-visible { outline: 3px solid var(--color-primary-soft); outline-offset: 2px; }
    .primary-btn svg { width: 18px; height: 18px; }

    /* Two equal-weight buttons for undetected Mac (Safari/Firefox) */
    .dual-cta {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .dual-cta .primary-btn { flex: 1 1 200px; max-width: 240px; }

    .switch-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 14px;
      font-size: 13px;
      color: var(--color-text-subtle);
      text-decoration: none;
      transition: color var(--transition);
    }
    .switch-link:hover { color: var(--color-primary); }
    .switch-link u { text-decoration: underline; }

    .hint {
      margin: 14px auto 0;
      font-size: 13px;
      color: var(--color-text-subtle);
    }
    .hint kbd {
      display: inline-block;
      padding: 1px 6px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
      font-size: 12px;
      color: var(--color-text-muted);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 4px;
    }

    .other {
      margin-top: 56px;
      padding-top: 32px;
      border-top: 1px solid var(--color-border);
    }
    .other h2 {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-subtle);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 16px;
    }
    .other-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .other-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      color: var(--color-text-muted);
      background: transparent;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
    }
    .other-link:hover {
      color: var(--color-primary);
      border-color: var(--color-primary);
      background: var(--color-primary-soft);
    }
    .other-link svg { width: 14px; height: 14px; flex-shrink: 0; }

    footer {
      margin-top: 64px;
      font-size: 12px;
      color: var(--color-text-subtle);
    }
    footer a { color: var(--color-text-subtle); text-decoration: none; }
    footer a:hover { color: var(--color-text-muted); text-decoration: underline; }
    .divider { display: inline-block; margin: 0 6px; opacity: 0.6; }

    /* Debug panel — shown only when ?debug is in URL */
    .debug-panel {
      display: none;
      margin: 24px auto 0;
      padding: 14px 18px;
      max-width: 520px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.7;
      text-align: left;
      color: var(--color-text-muted);
    }
    .debug-panel.show { display: block; }
    .debug-panel strong { color: var(--color-text); font-weight: 600; }
    .debug-panel .row { display: flex; gap: 8px; }
    .debug-panel .row .key { color: var(--color-text-subtle); flex-shrink: 0; min-width: 100px; }
    .debug-panel .row .val { word-break: break-all; }

    /* iOS/Android nudge */
    .mobile-note {
      display: none;
      margin: 0 auto 32px;
      padding: 14px 18px;
      max-width: 440px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--color-text-muted);
      text-align: left;
    }
    .mobile-note.show { display: block; }

    @media (max-width: 480px) {
      main { padding: 56px 20px 40px; }
      h1 { font-size: 30px; }
      .icon { width: 104px; height: 104px; margin-bottom: 24px; }
      .other-list { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <main>
    <img class="icon" src="icon.png" alt="" width="128" height="128">
    <h1>Medicai Sync</h1>
    <p class="tagline">Desktop companion for Medicai. Watches folders and removable drives for DICOM files and uploads them to your workspace automatically.</p>

    <div id="mobile-note" class="mobile-note">
      Medicai Sync runs on macOS and Windows desktops. Open this page on your computer to download it.
    </div>

    <div class="cta" id="cta"></div>
    <p class="hint" id="hint"></p>

    <div class="debug-panel" id="debug"></div>

    <div class="other" id="other"></div>

    <footer>
      <span id="version-info">Loading…</span>
      <span class="divider">·</span>
      <a href="https://github.com/aalecs/medicai-sync-releases/releases">All releases</a>
    </footer>
  </main>

  <script>
    const BASE = 'https://github.com/aalecs/medicai-sync-releases/releases/latest/download';
    const ASSETS = {
      mac_arm: { url: `${BASE}/Medicai-Sync-arm64.dmg`, label: 'macOS (Apple chip)' },
      mac_x64: { url: `${BASE}/Medicai-Sync-x64.dmg`,   label: 'macOS (Intel chip)' },
      win:     { url: `${BASE}/Medicai-Sync-Setup.exe`, label: 'Windows' }
    };

    const SVG = {
      apple:    '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516.024.034 1.52.087 2.475-1.258.955-1.345.762-2.391.728-2.43Zm3.314 11.733c-.048-.096-2.325-1.234-2.113-3.422.212-2.189 1.675-2.789 1.698-2.854.023-.064-.597-.79-1.254-1.157a3.692 3.692 0 0 0-1.563-.434c-.108-.003-.483-.095-1.254.116-.508.139-1.653.589-1.968.607-.316.018-1.256-.522-2.267-.665-.647-.125-1.333.131-1.824.328-.49.196-1.422.754-2.074 2.237-.652 1.482-.311 3.83-.067 4.56.244.729.625 1.924 1.273 2.796.576.984 1.34 1.667 1.659 1.899.319.232 1.219.386 1.843.067.502-.308 1.408-.485 1.766-.472.357.013 1.061.154 1.782.539.571.197 1.111.115 1.652-.105.541-.221 1.324-1.059 2.238-2.758.347-.79.505-1.217.473-1.282Z"/></svg>',
      windows:  '<svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 2.5h7.5V10H0V2.5Zm0 8.25H7.5V18H0v-7.25Zm8.25-8.25H16V10H8.25V2.5Zm0 8.25H16V18H8.25v-7.25Z" transform="translate(0 -2)"/></svg>',
      download: '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v9m0 0 4-4m-4 4-4-4M3 14h10"/></svg>'
    };

    function platformFromUA() {
      const ua = navigator.userAgent;
      const platform = navigator.platform || '';
      if (/iPhone|iPad|iPod|Android/i.test(ua)) return 'mobile';
      if (/Win/i.test(platform) || /Windows/i.test(ua)) return 'win';
      if (/Mac/i.test(platform) || /Macintosh/i.test(ua)) return 'mac';
      return 'unknown';
    }

    function btnHTML(asset, platformIcon, fullLabel) {
      // Note on Mac arch detection (handled inline in init()):
      //
      // Reliable on Chromium browsers (Chrome / Edge / Brave / Opera) via
      // navigator.userAgentData.getHighEntropyValues({architecture}).
      // Returns null on Safari and Firefox — they don't expose architecture
      // for fingerprinting reasons. In that case we don't presume; we show
      // both Mac options as equal-weight buttons and let the user pick.
      //
      // Apple Silicon Macs intentionally report "MacIntel" in navigator.platform
      // and freeze the OS version in the user-agent string at "Mac OS X 10_15_7",
      // so version-based detection is unreliable by design.
      const label = fullLabel ?? `Download for ${asset.label.split(' (')[0]}`;
      return `
        <a href="${asset.url}" class="primary-btn" download>
          ${SVG[platformIcon] || SVG.download}
          <span>${label}</span>
        </a>`;
    }

    function renderMac(detectedArch) {
      const cta = document.getElementById('cta');
      const hint = document.getElementById('hint');
      const other = document.getElementById('other');

      if (detectedArch) {
        // Confident detection (Chrome/Edge/Brave). Single big CTA — but the
        // label spells out the detected chip so the user can immediately
        // tell whether it matches their machine. Wrong-chip escape hatch
        // sits underneath.
        const asset = detectedArch === 'arm' ? ASSETS.mac_arm : ASSETS.mac_x64;
        const archLabel = detectedArch === 'arm' ? 'Apple chip' : 'Intel chip';
        const otherAsset = detectedArch === 'arm' ? ASSETS.mac_x64 : ASSETS.mac_arm;
        const otherLabel = detectedArch === 'arm' ? 'Intel' : 'Apple';
        cta.innerHTML = btnHTML(asset, 'apple', `macOS · ${archLabel}`);
        hint.innerHTML = `
          On a different Mac? Get the
          <a href="${otherAsset.url}" class="switch-link" download>
            <u>${otherLabel} chip</u> version
          </a> instead.`;
      } else {
        // Safari / Firefox / unknown — don't presume. Show two equal buttons.
        cta.innerHTML = `
          <div class="dual-cta">
            ${btnHTML(ASSETS.mac_arm, 'apple', 'macOS · Apple chip')}
            ${btnHTML(ASSETS.mac_x64, 'apple', 'macOS · Intel chip')}
          </div>`;
        hint.innerHTML = `
          Not sure which one? <kbd>Apple menu</kbd> → <kbd>About This Mac</kbd> → look for <em>Chip</em>.`;
      }

      other.innerHTML = `
        <h2>Other platforms</h2>
        <ul class="other-list">
          <li><a class="other-link" href="${ASSETS.win.url}" download>${SVG.windows}<span>Windows</span></a></li>
        </ul>`;
    }

    function renderWin() {
      const cta = document.getElementById('cta');
      const other = document.getElementById('other');
      cta.innerHTML = btnHTML(ASSETS.win, 'windows');
      other.innerHTML = `
        <h2>Other platforms</h2>
        <ul class="other-list">
          <li><a class="other-link" href="${ASSETS.mac_arm.url}" download>${SVG.apple}<span>macOS (Apple chip)</span></a></li>
          <li><a class="other-link" href="${ASSETS.mac_x64.url}" download>${SVG.apple}<span>macOS (Intel chip)</span></a></li>
        </ul>`;
    }

    function renderUnknown() {
      const cta = document.getElementById('cta');
      const other = document.getElementById('other');
      cta.innerHTML = '';
      other.innerHTML = `
        <h2>Choose your platform</h2>
        <ul class="other-list">
          <li><a class="other-link" href="${ASSETS.mac_arm.url}" download>${SVG.apple}<span>macOS (Apple chip)</span></a></li>
          <li><a class="other-link" href="${ASSETS.mac_x64.url}" download>${SVG.apple}<span>macOS (Intel chip)</span></a></li>
          <li><a class="other-link" href="${ASSETS.win.url}" download>${SVG.windows}<span>Windows</span></a></li>
        </ul>`;
    }

    function renderMobile() {
      document.getElementById('mobile-note').classList.add('show');
      renderUnknown();
    }

    async function showDebug(platform, arch, uachData) {
      if (!new URLSearchParams(location.search).has('debug')) return;
      const escape = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
      const row = (k, v) => `<div class="row"><span class="key">${k}</span><span class="val">${escape(v)}</span></div>`;
      const panel = document.getElementById('debug');
      panel.innerHTML = `
        <strong>Detection debug</strong>
        ${row('Platform:', platform)}
        ${row('Mac arch:', arch ?? '(undetected — falling back to user pick)')}
        ${row('userAgentData:', navigator.userAgentData ? 'available' : 'not exposed (Safari/Firefox)')}
        ${row('UA-CH architecture:', uachData?.architecture ?? '—')}
        ${row('UA-CH bitness:', uachData?.bitness ?? '—')}
        ${row('UA-CH platform:', uachData?.platform ?? '—')}
        ${row('navigator.platform:', navigator.platform)}
        ${row('navigator.userAgent:', navigator.userAgent)}
      `;
      panel.classList.add('show');
    }

    async function init() {
      const platform = platformFromUA();
      let arch = null;
      let uachData = null;
      if (platform === 'mac') {
        // Capture the raw UA-CH payload for debug display.
        try {
          if (navigator.userAgentData?.getHighEntropyValues) {
            uachData = await navigator.userAgentData.getHighEntropyValues(['architecture', 'bitness', 'platform']);
            if (uachData.architecture === 'arm') arch = 'arm';
            else if (uachData.architecture === 'x86') arch = 'x64';
          }
        } catch (_) { /* leave arch null */ }
        renderMac(arch);
      } else if (platform === 'win') {
        renderWin();
      } else if (platform === 'mobile') {
        renderMobile();
      } else {
        renderUnknown();
      }
      showDebug(platform, arch, uachData);

      // Footer: latest version + date.
      try {
        const res = await fetch('https://api.github.com/repos/aalecs/medicai-sync-releases/releases/latest');
        if (res.ok) {
          const data = await res.json();
          const tag = data.tag_name || '';
          const date = data.published_at
            ? new Date(data.published_at).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
            : '';
          document.getElementById('version-info').textContent = [tag, date].filter(Boolean).join(' · ');
        } else {
          document.getElementById('version-info').textContent = '';
        }
      } catch {
        document.getElementById('version-info').textContent = '';
      }
    }

    init();
  </script>
</body>
</html>
